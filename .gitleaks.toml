title = "gitleaks config for brightspace-mcp"

[extend]
useDefault = true

[allowlist]
description = "Known-safe strings in test fixtures and test idempotency keys"
regexTarget = "match"
regexes = [
  '''JBSWY3DPEHPK3PXP''',
  '''idem-[a-z0-9-]+''',
  '''e2e-[a-z0-9-]+-[0-9]+''',
]
paths = [
  '''tests/.*''',
  '''docs/superpowers/.*''',
]
