name: Release npm
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write  # OIDC for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://www.npmjs.com/package/brightspace-mcp
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          echo "Tag: $TAG  Package: $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG"
            exit 1
          fi

      - run: npm ci
      - run: npm run check
      - run: npm run build:clean

      - name: Publish to npm with provenance (OIDC trusted publisher)
        run: npm publish --provenance --access public
